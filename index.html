<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ドラクル 商圏分析</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --navy: #0b1a2e;
  --blue: #163358;
  --accent: #2878d4;
  --accent2: #4fa3ff;
  --white: #ffffff;
  --light: #f2f6fc;
  --border: #cddaee;
  --gray: #7a8fa8;
  --text: #18283e;
  --textsub: #4a607a;
  --green: #20b36b;
  --orange: #f08c1a;
  --red: #e03c3c;
  --sheet-bg: #ffffff;
  --radius: 16px;
  --tab-h: 60px;
  --header-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
  background: var(--navy);
  color: var(--text);
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--blue);
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 500;
}

.header-logo {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: 0.5px;
}
.header-logo span { color: var(--accent2); }

.header-stats {
  display: flex;
  gap: 14px;
}
.hstat {
  text-align: center;
}
.hstat-num {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
}
.hstat-lbl {
  font-size: 9px;
  color: var(--gray);
  margin-top: 2px;
}

/* ===== MAP ===== */
#map {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  bottom: var(--tab-h);
  z-index: 1;
}

/* ===== BOTTOM TABS ===== */
.bottom-tabs {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: var(--blue);
  border-top: 1px solid rgba(255,255,255,0.12);
  display: flex;
  z-index: 500;
}

.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  color: var(--gray);
  font-size: 10px;
  cursor: pointer;
  transition: color 0.2s;
  padding: 6px 0;
}
.tab-btn.active { color: var(--accent2); }
.tab-icon { font-size: 22px; line-height: 1; }

/* ===== BOTTOM SHEET ===== */
.sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 600;
}
.sheet-overlay.open { display: block; }

.bottom-sheet {
  position: fixed;
  left: 0; right: 0;
  bottom: var(--tab-h);
  background: var(--sheet-bg);
  border-radius: var(--radius) var(--radius) 0 0;
  z-index: 700;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.bottom-sheet.open { transform: translateY(0); }

.sheet-handle {
  display: flex;
  justify-content: center;
  padding: 12px 0 6px;
  flex-shrink: 0;
}
.handle-bar {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
}

.sheet-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 0 20px 12px;
  flex-shrink: 0;
}

.sheet-body {
  padding: 0 16px 16px;
  overflow-y: auto;
  flex: 1;
}

/* ===== INPUT FORM ===== */
.type-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.type-tile {
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--light);
}
.type-tile.selected {
  border-color: var(--accent);
  background: #e8f2ff;
}
.type-tile-icon { font-size: 22px; }
.type-tile-lbl { font-size: 12px; font-weight: 700; color: var(--textsub); margin-top: 4px; }
.type-tile.selected .type-tile-lbl { color: var(--accent); }

.field-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--textsub);
  margin-bottom: 6px;
  margin-top: 12px;
}

.field-input {
  width: 100%;
  padding: 14px 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  color: var(--text);
  background: var(--light);
  appearance: none;
}
.field-input:focus {
  outline: none;
  border-color: var(--accent);
  background: white;
}

.add-btn {
  width: 100%;
  margin-top: 16px;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s;
}
.add-btn:active { background: var(--blue); }
.add-btn:disabled { background: var(--gray); }

/* ===== POINT LIST ===== */
.point-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.point-card:last-child { border-bottom: none; }

.pcard-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.pcard-info { flex: 1; min-width: 0; }
.pcard-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pcard-addr {
  font-size: 12px; color: var(--textsub); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pcard-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 20px; color: white; flex-shrink: 0;
}
.pcard-del {
  background: none; border: none; color: var(--gray);
  font-size: 22px; cursor: pointer; padding: 4px; flex-shrink: 0;
  line-height: 1;
}
.pcard-del:active { color: var(--red); }

.empty-hint {
  text-align: center; padding: 32px 16px; color: var(--gray); font-size: 13px; line-height: 1.8;
}

/* ===== ANALYSIS ===== */
.analysis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.a-card {
  background: var(--light);
  border-radius: 12px;
  padding: 12px;
}
.a-val {
  font-size: 17px; font-weight: 700; color: var(--accent);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.a-lbl { font-size: 10px; color: var(--textsub); margin-top: 4px; }

.strategy-box {
  background: #e8f2ff;
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--textsub);
  line-height: 1.8;
}

/* ===== SETTINGS ===== */
.setting-row {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-lbl { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.setting-sub { font-size: 12px; color: var(--textsub); margin-top: 4px; }

.radius-wrap { display: flex; align-items: center; gap: 12px; }
.radius-slider {
  flex: 1; accent-color: var(--accent); height: 4px;
}
.radius-val { font-size: 15px; font-weight: 700; color: var(--accent); width: 52px; text-align: right; }

.toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.toggle-btn {
  padding: 12px 8px; border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--light); font-size: 12px; font-weight: 700; color: var(--textsub);
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.toggle-btn.on { background: var(--accent); color: white; border-color: var(--accent); }

.danger-btn {
  width: 100%; padding: 14px; margin-top: 16px;
  background: none; border: 1.5px solid var(--red);
  border-radius: 12px; color: var(--red); font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.danger-btn:active { background: #fff0f0; }

/* ===== FAB ===== */
.fab {
  position: fixed;
  right: 18px;
  bottom: calc(var(--tab-h) + 16px);
  width: 56px; height: 56px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(40,120,212,0.5);
  cursor: pointer;
  z-index: 400;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 80px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 13px;
  z-index: 900; opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  border: 1px solid var(--accent);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== LOADING ===== */
.loading {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.65);
  z-index: 950;
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
.loading.show { display: flex; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: white; font-size: 14px; }

/* map zoom control position */
.leaflet-top.leaflet-left { top: 8px; left: 8px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">ドラクル <span>商圏分析</span></div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-num" id="st-all">0</div><div class="hstat-lbl">総拠点</div></div>
    <div class="hstat"><div class="hstat-num" id="st-fr">0</div><div class="hstat-lbl">加盟店</div></div>
    <div class="hstat"><div class="hstat-num" id="st-dr">0</div><div class="hstat-lbl">ドライバー</div></div>
    <div class="hstat"><div class="hstat-num" id="st-pr">0</div><div class="hstat-lbl">営業候補</div></div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- FAB -->
<button class="fab" onclick="openSheet('add')" title="拠点を追加">＋</button>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <button class="tab-btn active" id="tab-map" onclick="switchTab('map')">
    <span class="tab-icon">🗺️</span>地図
  </button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">
    <span class="tab-icon">📋</span>一覧
  </button>
  <button class="tab-btn" id="tab-analysis" onclick="switchTab('analysis')">
    <span class="tab-icon">📊</span>分析
  </button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
    <span class="tab-icon">⚙️</span>設定
  </button>
</div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ADD SHEET -->
<div class="bottom-sheet" id="sheet-add">
  <div class="sheet-handle"><div class="handle-bar"></div></div>
  <div class="sheet-title">拠点を追加</div>
  <div class="sheet-body">
    <div class="type-grid">
      <div class="type-tile selected" data-type="franchise" onclick="selectType(this)">
        <div class="type-tile-icon">🏪</div>
        <div class="type-tile-lbl">加盟店</div>
      </div>
      <div class="type-tile" data-type="driver" onclick="selectType(this)">
        <div class="type-tile-icon">🚗</div>
        <div class="type-tile-lbl">ドライバー</div>
      </div>
      <div class="type-tile" data-type="prospect" onclick="selectType(this)">
        <div class="type-tile-icon">🎯</div>
        <div class="type-tile-lbl">営業候補</div>
      </div>
      <div class="type-tile" data-type="other" onclick="selectType(this)">
        <div class="type-tile-icon">📍</div>
        <div class="type-tile-lbl">その他</div>
      </div>
    </div>
    <div class="field-label">名称（任意）</div>
    <input class="field-input" type="text" id="inp-name" placeholder="例：東京トヨタ渋谷店" autocomplete="off"/>
    <div class="field-label">住所</div>
    <input class="field-input" type="text" id="inp-addr" placeholder="例：東京都渋谷区道玄坂1-1" autocomplete="off" inputmode="text"/>
    <button class="add-btn" id="add-btn" onclick="addPoint()">
      <span>📍</span> 地図に追加する
    </button>
  </div>
</div>

<!-- LIST SHEET -->
<div class="bottom-sheet" id="sheet-list">
  <div class="sheet-handle"><div class="handle-bar"></div></div>
  <div class="sheet-title">登録拠点一覧</div>
  <div class="sheet-body" id="point-list-body">
    <div class="empty-hint">まだ拠点が登録されていません。<br>＋ボタンから住所を追加してください。</div>
  </div>
</div>

<!-- ANALYSIS SHEET -->
<div class="bottom-sheet" id="sheet-analysis">
  <div class="sheet-handle"><div class="handle-bar"></div></div>
  <div class="sheet-title">エリア分析レポート</div>
  <div class="sheet-body" id="analysis-body">
    <div class="empty-hint">2件以上の拠点を登録すると<br>分析結果がここに表示されます。</div>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="bottom-sheet" id="sheet-settings">
  <div class="sheet-handle"><div class="handle-bar"></div></div>
  <div class="sheet-title">表示設定</div>
  <div class="sheet-body">
    <div class="setting-row">
      <div class="setting-lbl">商圏半径</div>
      <div class="radius-wrap">
        <input class="radius-slider" type="range" id="radius-sl" min="1" max="30" value="5" oninput="updateRadius(this.value)"/>
        <span class="radius-val" id="radius-val">5 km</span>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-lbl">表示レイヤー</div>
      <div class="toggle-grid">
        <button class="toggle-btn on" id="tbtn-circle" onclick="toggleCircle()">エリア円</button>
        <button class="toggle-btn on" id="tbtn-center" onclick="toggleCenter()">中心点</button>
        <button class="toggle-btn" id="tbtn-heat" onclick="toggleHeat()">密度色分け</button>
        <button class="toggle-btn on" id="tbtn-fit" onclick="fitAll()">全体表示</button>
      </div>
    </div>
    <button class="danger-btn" onclick="clearAll()">すべてクリア</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">住所を検索しています...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== MAP INIT =====
const map = L.map('map', { zoomControl: true }).setView([35.6762, 139.6503], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18
}).addTo(map);

// ===== STATE =====
const points = [];
let selectedType = 'franchise';
let showCircle = true, showCenter = true, heatMode = false;
let radiusKm = 5;
let centerMarker = null, centerCircle = null;
let activeTab = 'map';
let activeSheet = null;

const typeConfig = {
  franchise: { color: '#2878d4', label: '加盟店', emoji: '🏪' },
  driver:    { color: '#20b36b', label: 'ドライバー', emoji: '🚗' },
  prospect:  { color: '#f08c1a', label: '営業候補', emoji: '🎯' },
  other:     { color: '#7a8fa8', label: 'その他', emoji: '📍' }
};

// ===== SHEET CONTROL =====
function openSheet(name) {
  closeSheet();
  const sheet = document.getElementById('sheet-' + name);
  const overlay = document.getElementById('overlay');
  if (!sheet) return;
  sheet.classList.add('open');
  overlay.classList.add('open');
  activeSheet = name;
  if (name === 'list') renderList();
  if (name === 'analysis') renderAnalysis();
}

function closeSheet() {
  document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
  activeSheet = null;
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'map') { closeSheet(); return; }
  openSheet(name);
}

// ===== TYPE SELECTOR =====
function selectType(el) {
  document.querySelectorAll('.type-tile').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
}

// ===== GEOCODE =====
async function geocode(addr) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1&accept-language=ja`;
  const res = await fetch(url, { headers: { 'User-Agent': 'DorakuruApp/1.0' } });
  const data = await res.json();
  if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  return null;
}

async function reverseGeocode(lat, lng) {
  const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`;
  const res = await fetch(url, { headers: { 'User-Agent': 'DorakuruApp/1.0' } });
  const data = await res.json();
  return data && data.address ? (data.address.suburb || data.address.city_district || data.address.city || '不明') : '不明';
}

// ===== ADD POINT =====
async function addPoint() {
  const addr = document.getElementById('inp-addr').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  if (!addr) { showToast('住所を入力してください'); return; }

  setLoading(true, '住所を検索しています...');
  document.getElementById('add-btn').disabled = true;

  try {
    const geo = await geocode(addr);
    if (!geo) { showToast('住所が見つかりませんでした'); return; }

    const cfg = typeConfig[selectedType];
    const displayName = name || addr;

    const marker = L.marker([geo.lat, geo.lng], { icon: makeIcon(selectedType) })
      .addTo(map)
      .bindPopup(`<b>${displayName}</b><br><span style="color:#666;font-size:12px">${cfg.label}</span><br><span style="font-size:11px">${addr}</span>`);

    let circle = null;
    if (showCircle) circle = makeCircle(geo.lat, geo.lng, selectedType);

    points.push({ lat: geo.lat, lng: geo.lng, addr, name: displayName, type: selectedType, marker, circle });

    document.getElementById('inp-addr').value = '';
    document.getElementById('inp-name').value = '';

    updateStats();
    updateCenterMarker();

    map.setView([geo.lat, geo.lng], Math.max(map.getZoom(), 13));
    closeSheet();
    showToast(`${displayName} を追加しました`);

  } catch(e) {
    showToast('エラーが発生しました');
  } finally {
    setLoading(false);
    document.getElementById('add-btn').disabled = false;
  }
}

function makeIcon(type) {
  const cfg = typeConfig[type];
  return L.divIcon({
    className: '',
    html: `<div style="width:34px;height:34px;background:${cfg.color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:14px;">${cfg.emoji}</span></div>`,
    iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -36]
  });
}

function makeCircle(lat, lng, type) {
  const cfg = typeConfig[type];
  return L.circle([lat, lng], {
    radius: radiusKm * 1000,
    color: cfg.color, fillColor: cfg.color,
    fillOpacity: 0.08, weight: 1.5, dashArray: '5,4'
  }).addTo(map);
}

// ===== REMOVE =====
function removePoint(idx) {
  const p = points[idx];
  if (p.marker) map.removeLayer(p.marker);
  if (p.circle) map.removeLayer(p.circle);
  points.splice(idx, 1);
  updateStats();
  updateCenterMarker();
  renderList();
  showToast('削除しました');
}

// ===== RENDER LIST =====
function renderList() {
  const body = document.getElementById('point-list-body');
  if (points.length === 0) {
    body.innerHTML = '<div class="empty-hint">まだ拠点が登録されていません。<br>＋ボタンから住所を追加してください。</div>';
    return;
  }
  body.innerHTML = points.map((p, i) => {
    const cfg = typeConfig[p.type];
    return `<div class="point-card" onclick="flyTo(${i})">
      <div class="pcard-icon" style="background:${cfg.color}">${cfg.emoji}</div>
      <div class="pcard-info">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-addr">${p.addr}</div>
      </div>
      <span class="pcard-badge" style="background:${cfg.color}">${cfg.label}</span>
      <button class="pcard-del" onclick="event.stopPropagation();removePoint(${i})">×</button>
    </div>`;
  }).join('');
}

function flyTo(idx) {
  const p = points[idx];
  closeSheet();
  switchTab('map');
  setTimeout(() => {
    map.setView([p.lat, p.lng], 14);
    p.marker.openPopup();
  }, 200);
}

// ===== ANALYSIS =====
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getCentroid() {
  if (!points.length) return null;
  return { lat: points.reduce((s,p)=>s+p.lat,0)/points.length, lng: points.reduce((s,p)=>s+p.lng,0)/points.length };
}

async function renderAnalysis() {
  const body = document.getElementById('analysis-body');
  if (points.length < 2) {
    body.innerHTML = '<div class="empty-hint">2件以上の拠点を登録すると<br>分析結果がここに表示されます。</div>';
    return;
  }

  body.innerHTML = '<div class="empty-hint">分析中...</div>';

  const c = getCentroid();
  let maxDist = 0;
  for (let i=0; i<points.length; i++)
    for (let j=i+1; j<points.length; j++) {
      const d = haversine(points[i].lat,points[i].lng,points[j].lat,points[j].lng);
      if (d>maxDist) maxDist=d;
    }

  let minAvg = Infinity, denseIdx = 0;
  points.forEach((p,i) => {
    const avg = points.filter((_,j)=>j!==i).reduce((s,q)=>s+haversine(p.lat,p.lng,q.lat,q.lng),0)/(points.length-1);
    if (avg<minAvg) { minAvg=avg; denseIdx=i; }
  });

  const maxFromCenter = Math.max(...points.map(p=>haversine(c.lat,c.lng,p.lat,p.lng)));
  const frCount = points.filter(p=>p.type==='franchise').length;
  const drCount = points.filter(p=>p.type==='driver').length;
  const prCount = points.filter(p=>p.type==='prospect').length;

  let centerArea = '取得中...';
  try { centerArea = await reverseGeocode(c.lat, c.lng); } catch(e) {}

  let strategy = '';
  if (maxDist > 50) strategy += '拠点が広域に分散しています。担当エリアの分割や中間拠点の設置を検討するタイミングです。\n\n';
  else if (maxDist > 20) strategy += '広域展開の段階です。中心エリアを軸にした効率的なルート設計が重要になります。\n\n';
  else strategy += '拠点がコンパクトにまとまっています。このエリアでの深耕と品質強化が次の一手です。\n\n';

  if (drCount < frCount) strategy += `加盟店${frCount}件に対してドライバー${drCount}名と不足気味です。このエリアでのドライバー募集を優先しましょう。`;
  else if (prCount > 0) strategy += `営業候補${prCount}件を登録中です。中心エリアに近い候補から優先的にアプローチすると効率的です。`;
  else strategy += '加盟店とドライバーのバランスが取れています。営業候補を追加するとさらに戦略が深まります。';

  body.innerHTML = `
    <div class="analysis-grid">
      <div class="a-card"><div class="a-val">${centerArea}</div><div class="a-lbl">中心エリア</div></div>
      <div class="a-card"><div class="a-val">${maxDist.toFixed(1)} km</div><div class="a-lbl">拠点間最大距離</div></div>
      <div class="a-card"><div class="a-val">${points[denseIdx].name}</div><div class="a-lbl">最密集エリア</div></div>
      <div class="a-card"><div class="a-val">${maxFromCenter.toFixed(1)} km</div><div class="a-lbl">中心からの最大距離</div></div>
    </div>
    <div class="strategy-box">${strategy.replace(/\n/g,'<br>')}</div>
  `;
}

// ===== CENTER MARKER =====
function updateCenterMarker() {
  if (centerMarker) { map.removeLayer(centerMarker); centerMarker=null; }
  if (centerCircle) { map.removeLayer(centerCircle); centerCircle=null; }
  if (points.length < 2 || !showCenter) return;
  const c = getCentroid();
  centerMarker = L.marker([c.lat,c.lng], {
    icon: L.divIcon({
      className:'',
      html:`<div style="width:22px;height:22px;background:#e03c3c;border:3px solid white;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`,
      iconSize:[22,22], iconAnchor:[11,11]
    }), zIndexOffset:1000
  }).addTo(map).bindPopup('<b>重心・中心点</b><br>登録拠点の平均中心');

  if (showCircle) {
    const maxD = Math.max(...points.map(p=>haversine(c.lat,c.lng,p.lat,p.lng)));
    centerCircle = L.circle([c.lat,c.lng],{
      radius:maxD*1000, color:'#e03c3c', fillColor:'#e03c3c',
      fillOpacity:0.04, weight:2, dashArray:'8,4'
    }).addTo(map);
  }
}

// ===== SETTINGS =====
function updateRadius(val) {
  radiusKm = parseFloat(val);
  document.getElementById('radius-val').textContent = val + ' km';
  points.forEach(p => { if (p.circle) p.circle.setRadius(radiusKm*1000); });
  if (centerCircle && points.length>=2) {
    const c=getCentroid(), maxD=Math.max(...points.map(p=>haversine(c.lat,c.lng,p.lat,p.lng)));
    centerCircle.setRadius(maxD*1000);
  }
}

function toggleCircle() {
  showCircle = !showCircle;
  document.getElementById('tbtn-circle').classList.toggle('on', showCircle);
  points.forEach(p => {
    if (showCircle && !p.circle) p.circle = makeCircle(p.lat, p.lng, p.type);
    else if (!showCircle && p.circle) { map.removeLayer(p.circle); p.circle=null; }
  });
  updateCenterMarker();
}

function toggleCenter() {
  showCenter = !showCenter;
  document.getElementById('tbtn-center').classList.toggle('on', showCenter);
  updateCenterMarker();
}

function toggleHeat() {
  heatMode = !heatMode;
  document.getElementById('tbtn-heat').classList.toggle('on', heatMode);
  points.forEach(p => {
    if (!p.circle) return;
    const nearby = points.filter(q=>q!==p&&haversine(p.lat,p.lng,q.lat,q.lng)<radiusKm).length;
    p.circle.setStyle({ fillOpacity: heatMode ? Math.min(0.06+nearby*0.1, 0.45) : 0.08 });
  });
}

function fitAll() {
  if (!points.length) return;
  map.fitBounds(L.featureGroup(points.map(p=>p.marker)).getBounds().pad(0.2));
  closeSheet();
  switchTab('map');
}

function clearAll() {
  if (!points.length) return;
  if (!confirm('すべての拠点を削除しますか？')) return;
  points.forEach(p=>{ if(p.marker)map.removeLayer(p.marker); if(p.circle)map.removeLayer(p.circle); });
  points.length=0;
  if(centerMarker){map.removeLayer(centerMarker);centerMarker=null;}
  if(centerCircle){map.removeLayer(centerCircle);centerCircle=null;}
  updateStats();
  showToast('全拠点をクリアしました');
  closeSheet();
}

// ===== UTILS =====
function updateStats() {
  document.getElementById('st-all').textContent = points.length;
  document.getElementById('st-fr').textContent = points.filter(p=>p.type==='franchise').length;
  document.getElementById('st-dr').textContent = points.filter(p=>p.type==='driver').length;
  document.getElementById('st-pr').textContent = points.filter(p=>p.type==='prospect').length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function setLoading(show, msg) {
  const el = document.getElementById('loading');
  if (msg) document.getElementById('loading-msg').textContent = msg;
  el.classList.toggle('show', show);
}
</script>
